<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PW Shift Tracker">
<meta name="theme-color" content="#111418" id="theme-meta">
<title>Padeswood Works - Shift Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Figtree:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --ff-head: 'Outfit', sans-serif;
    --ff-body: 'Figtree', sans-serif;
    --ff-mono: 'Fira Code', monospace;
    --ease-smooth: cubic-bezier(.22,1,.36,1);
    --bg: #f0f3f8;
    --bg2: #ffffff;
    --bg3: #eaeef6;
    --bg4: #f5f7fc;
    --text: #0d1526;
    --text2: #4a5870;
    --text3: #9aaabf;
    --border: #b8c4db;
    --border2: #d0d8ea;
    --shadow: rgba(0,0,0,0.08);
    --accent: #1a7a35;
    --accent2: #22a847;
    --accent-soft: rgba(26,122,53,.10);
    --accent-soft-2: rgba(26,122,53,.18);
    --accent-border: rgba(26,122,53,.28);
    --danger-soft: rgba(240,82,79,.10);
    --danger-border: rgba(240,82,79,.28);
    --glass-1: rgba(255,255,255,.68);
    --glass-2: rgba(255,255,255,.26);
    --glass-3: rgba(255,255,255,.72);
    --glass-4: rgba(255,255,255,.64);
    --glass-5: rgba(255,255,255,.66);
    --glass-6: rgba(255,255,255,.62);
    --glass-7: rgba(255,255,255,.66);
  }
  .dark {
    --bg: #111418;
    --bg2: #16191f;
    --bg3: #222830;
    --bg4: #1c2028;
    --text: #dde4ee;
    --text2: #6b7a96;
    --text3: #323d50;
    --border: #2f3a4a;
    --border2: #252c38;
    --shadow: rgba(0,0,0,0.32);
    --accent: #1a7a35;
    --accent2: #2ecc5c;
    --accent-soft: rgba(26,122,53,.10);
    --accent-soft-2: rgba(26,122,53,.18);
    --accent-border: rgba(26,122,53,.28);
    --danger-soft: rgba(240,82,79,.10);
    --danger-border: rgba(240,82,79,.28);
    --glass-1: rgba(22,25,31,.72);
    --glass-2: rgba(22,25,31,.26);
    --glass-3: rgba(22,25,31,.82);
    --glass-4: rgba(22,25,31,.72);
    --glass-5: rgba(22,25,31,.80);
    --glass-6: rgba(22,25,31,.76);
    --glass-7: rgba(22,25,31,.80);
  }

  body {
    background: var(--bg); color: var(--text);
    font-family: var(--ff-body);
    min-height: 100vh; min-height: 100dvh;
    overflow-x: hidden;
    transition: background-color 0.35s var(--ease-smooth), color 0.35s var(--ease-smooth);
    animation: pageEnter 0.45s var(--ease-smooth) both;
    -webkit-font-smoothing: antialiased;
    position: relative;
  }
  @keyframes pageEnter { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:none } }
  @media (prefers-reduced-motion: reduce) {
    *,*::before,*::after { animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important; scroll-behavior:auto !important; }
    body { animation:none !important; }
  }
  body :where(.splash-btn,.tracker-shell-back,.tracker-shell-icon,.pill,.nav-btn,.tab,.card,.action-btn,.share-btn,.today-btn,.page,.header-btn,.tracker-shell,.modal,.toast,.panel,.shift-panel,.matrix-card,.card,.input,.splash-card) { transition-timing-function: var(--ease-smooth); }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: radial-gradient(circle, rgba(26,122,53,.06) 1px, transparent 1px);
    background-size: 28px 28px;
  }
  body.dark::before {
    background-image: radial-gradient(circle, rgba(26,122,53,.06) 1px, transparent 1px);
  }
  body * { transition: background-color 0.3s, border-color 0.3s, color 0.3s; }

  #splash {
    position: fixed; inset: 0; z-index: 1000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg);
    transition: opacity 0.6s ease, transform 0.6s ease;
    padding: 32px 24px;
  }
  #splash::after {
    content: '';
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent 0%, var(--accent) 50%, transparent 100%);
    opacity: .5;
  }
  #splash.hide { opacity: 0; transform: scale(1.04); pointer-events: none; }

  .splash-icon {
    width: 58px; height: 58px; border-radius: 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    font-family: var(--ff-head);
    font-weight: 800;
    letter-spacing: -0.06em;
    color: #fff;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(26,122,53,.30);
    animation: splashPop 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    animation-delay: 0.2s; opacity: 0;
  }
  .splash-title {
    font-family: var(--ff-head);
    font-size: 28px; font-weight: 700; color: var(--text);
    letter-spacing: -0.03em; margin-top: 18px;
    animation: splashFade 0.5s ease both;
    animation-delay: 0.5s; opacity: 0;
  }
  .splash-sub {
    font-family: var(--ff-mono);
    font-size: 10px; color: var(--text3);
    letter-spacing: 0.22em; text-transform: uppercase;
    margin-top: 8px;
    animation: splashFade 0.5s ease both;
    animation-delay: 0.7s; opacity: 0;
    text-align: center;
  }
  .splash-credit {
    font-family: var(--ff-mono);
    font-size: 10px; color: var(--text3);
    margin-top: 18px; letter-spacing: 0.16em;
    text-transform: uppercase;
    animation: splashFade 0.5s ease both;
    animation-delay: 1.1s; opacity: 0;
  }
  #splash-login {
    width: 100%; max-width: 372px; margin-top: 30px; padding: 0 8px;
    animation: splashFade 0.5s ease both; animation-delay: 0.9s; opacity: 0;
  }
  #splash-login > div {
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 28px 28px 24px;
    box-shadow: 0 20px 56px rgba(0,0,0,.14);
    position: relative;
    overflow: hidden;
  }
  #splash-login > div::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent2), transparent);
  }
  .splash-panel-label {
    display:block;
    font-family: var(--ff-mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 1px;
  }
  .splash-input {
    width: 100%; height: 40px; padding: 0 12px;
    border-radius: 7px; border: 1px solid var(--border);
    background: var(--bg3); color: var(--text);
    font-size: 13.5px; font-family: var(--ff-body);
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    text-align: left;
  }
  .splash-input::placeholder { color: var(--text3); opacity: 1; }
  .splash-input:focus::placeholder { color: transparent; }
  .splash-input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px var(--accent-soft); }
  .splash-btn {
    width: 100%; height: 42px; border-radius: 7px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none; font-weight: 700; font-size: 14px;
    cursor: pointer; font-family: var(--ff-head);
    transition: opacity 0.2s, transform 0.15s; letter-spacing: 0.02em;
    box-shadow: 0 4px 22px rgba(26,122,53,.35);
  }
  .splash-btn:active { transform: scale(0.97); opacity: 0.88; }
  .splash-error {
    display: none;
    font-family: var(--ff-mono); font-size: 12px; color: #f0524f;
    text-align: center; line-height: 1.5;
    background: rgba(240,82,79,.10); border: 1px solid rgba(240,82,79,.28);
    border-radius: 7px; padding: 8px 12px;
  }
  .access-denied {
    display: none;
    background: var(--bg2);
    border: 1px solid var(--danger-border);
    border-radius: 14px;
    padding: 22px 20px 18px;
    box-shadow: 0 4px 18px var(--shadow);
    text-align: center;
    margin-top: 18px;
  }
  .access-denied::before {
    content: '';
    display: block;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--danger), transparent);
    margin: -22px -20px 16px;
  }
  .access-denied-title {
    font-family: var(--ff-head);
    font-weight: 700;
    font-size: 19px;
    letter-spacing: -.4px;
    color: var(--text);
    margin-bottom: 8px;
  }
  .access-denied-msg {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text2);
    margin-bottom: 16px;
  }
  .access-denied-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 40px;
    padding: 0 16px;
    border-radius: 7px;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text);
    font-family: var(--ff-head);
    font-weight: 600;
    font-size: 13px;
    text-decoration: none;
  }
  .splash-dots { display: flex; gap: 6px; margin-top: 48px; }
  .splash-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--border);
    animation: dotPulse 1.2s ease-in-out infinite;
  }
  .splash-dot:nth-child(2) { animation-delay: 0.2s; }
  .splash-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes splashPop { from { opacity:0; transform:scale(0.6) } to { opacity:1; transform:scale(1) } }
  @keyframes splashFade { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:none } }
  @keyframes dotPulse { 0%,100%{background:var(--border);transform:scale(1)} 50%{background:var(--accent2);transform:scale(1.3)} }

  #app-wrap {
    max-width: none;
    margin: 0;
    width: 100%;
    padding: 0 0 max(env(safe-area-inset-bottom),48px);
    opacity: 0; transform: translateY(12px);
    transition: opacity 0.5s ease, transform 0.5s ease, background-color 0.3s;
    background: var(--bg);
    min-height: 100vh; min-height: 100dvh;
    position: relative;
    z-index: 1;
  }
  #app-wrap.visible { opacity: 1; transform: none; }
  .tracker-shell {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
    height: 56px;
    padding: 0 20px;
    border-bottom: 1px solid var(--border2);
    background: rgba(255,255,255,.68);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    overflow: visible;
  }
  .dark .tracker-shell {
    background: rgba(22,25,31,.80);
  }
  .tracker-shell::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent2), transparent);
    opacity: .28;
  }
  .tracker-shell-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
    flex: 1 1 auto;
  }
  .tracker-shell-back {
    width: 32px;
    height: 32px;
    border-radius: 7px;
    border: 1px solid var(--border2);
    background: rgba(255,255,255,.24);
    color: var(--text2);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: border-color .18s, color .18s, background-color .18s;
  }
  .tracker-shell-back:hover {
    border-color: var(--accent2);
    color: var(--accent2);
    background: var(--accent-soft);
  }
  .tracker-shell-mark {
    width: 36px;
    height: 36px;
    border-radius: 0;
    background: none;
    border: none;
    padding: 0;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--ff-head);
    font-weight: 800;
    font-size: 13px;
    letter-spacing: -0.06em;
    box-shadow: none;
    flex-shrink: 0;
    overflow: hidden;
  }
  .tracker-shell-mark img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .tracker-shell-copy {
    min-width: 0;
    flex: 1;
  }
  .tracker-shell-kicker {
    display: none;
  }
  .tracker-shell-title {
    font-family: var(--ff-head);
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tracker-shell-sub {
    font-family: var(--ff-mono);
    font-size: 9px;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--text3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tracker-shell-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    margin-left: auto;
  }
  .tracker-shell-user {
    font-family: var(--ff-mono);
    font-size: 10px;
    color: var(--text3);
    padding: 4px 10px;
    border: 1px solid var(--border2);
    border-radius: 5px;
    display: none;
    align-items: center;
    gap: 6px;
    max-width: 280px;
  }
  .tracker-shell-user-email {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .tracker-shell-role {
    font-size: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .tracker-shell-role.role-admin {
    background: var(--accent-soft-2);
    color: var(--accent2);
  }
  .tracker-shell-role.role-reviewer {
    background: rgba(155,116,232,.10);
    color: #9b74e8;
  }
  .tracker-shell-role.role-editor {
    background: rgba(245,166,35,.10);
    color: #f5a623;
  }
  .tracker-shell-role.role-viewer {
    background: rgba(255,255,255,.28);
    color: var(--text3);
    border: 1px solid var(--border2);
  }
  .tracker-shell-icon {
    width: 32px;
    height: 32px;
    border-radius: 7px;
    border: 1px solid var(--border2);
    background: rgba(255,255,255,.22);
    color: var(--text2);
    text-decoration: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: border-color .18s, color .18s, background-color .18s, transform .18s;
    flex-shrink: 0;
  }
  .tracker-shell-icon:hover {
    border-color: var(--accent2);
    color: var(--accent2);
    background: var(--accent-soft);
  }
  .tracker-shell-icon:active {
    transform: scale(.97);
  }
  .tracker-shell-icon.logout {
    color: #f0524f;
  }
  .tracker-shell-icon.logout:hover {
    border-color: var(--danger-border);
    color: #f0524f;
    background: var(--danger-soft);
  }
  #app {
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 20px 0;
  }
  .tracker-shell-footer {
    max-width: 900px;
    margin: 18px auto 0;
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    font-family: var(--ff-mono);
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text3);
  }
  .tracker-shell-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .tracker-shell-status::before {
    content: '';
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }

  .page { animation: pageIn 0.28s cubic-bezier(0.25,0.46,0.45,0.94) both; }
  @keyframes pageIn { from { opacity:0; transform:translateY(14px) } to { opacity:1; transform:none } }

  .mono { font-family: var(--ff-mono); }
  .pill { transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1); cursor: pointer; user-select: none; -webkit-user-select: none; }
  .pill:active { transform: scale(0.9); }
  .nav-btn { background: var(--bg2); border: 1px solid var(--border2); color: var(--text2); border-radius: 7px; padding: 7px 16px; cursor: pointer; font-size: 20px; line-height: 1; font-family: var(--ff-body); transition: all 0.15s; box-shadow: 0 1px 3px var(--shadow); }
  .nav-btn { background: var(--glass-1); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); }
  .dark .nav-btn { background: rgba(22,25,31,.72); }
  .nav-btn:active { background: var(--bg3); transform: scale(0.95); }
  .tab { cursor: pointer; padding: 8px 13px; border-radius: 8px; font-size: 12px; font-weight: 600; transition: all 0.2s; white-space: nowrap; border: 1px solid transparent; background: var(--glass-2); font-family: var(--ff-body); color: var(--text2); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); }
  .dark .tab { background: rgba(22,25,31,.58); }
  .tab.active { background: var(--glass-3); color: var(--accent2); box-shadow: 0 1px 3px var(--shadow); border-color: var(--border2); }
  .dark .tab.active { background: rgba(22,25,31,.82); }
  .tab:active { transform: scale(0.95); }
  input[type="date"], input[type="text"], textarea { font-family: var(--ff-body); font-size: 14px; border: 1px solid var(--border2); border-radius: 7px; padding: 10px 12px; width: 100%; background: var(--glass-4); color: var(--text); outline: none; transition: border-color 0.2s; backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }
  .dark input[type="date"], .dark input[type="text"], .dark textarea { background: rgba(22,25,31,.72); }
  input:focus, textarea:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px var(--accent-soft); }
  .card { background: var(--glass-5); border-radius: 14px; padding: 16px; box-shadow: 0 12px 36px rgba(0,0,0,.12); margin-bottom: 14px; border: 1px solid var(--border2); transition: background 0.3s, border-color 0.3s; position: relative; overflow: hidden; backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
  .dark .card { background: rgba(22,25,31,.80); }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent2), transparent); opacity: .85; }
  .badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; letter-spacing: 0.05em; }
  .today-btn { background: var(--glass-6); border: 1px solid var(--border2); border-radius: 7px; padding: 5px 12px; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--text2); font-family: var(--ff-body); transition: all 0.15s; backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); }
  .dark .today-btn { background: rgba(22,25,31,.76); }
  .today-btn:active { background: var(--bg3); }
  .action-btn { width: 100%; padding: 12px; border-radius: 7px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; font-weight: 600; font-size: 14px; cursor: pointer; font-family: var(--ff-head); transition: all 0.2s; box-shadow: 0 4px 22px rgba(26,122,53,.24); }
  .action-btn:active { transform: scale(0.98); opacity: 0.85; }
  .share-btn { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; border-radius: 7px; padding: 12px; width: 100%; font-size: 14px; font-weight: 600; cursor: pointer; font-family: var(--ff-head); margin-top: 8px; transition: all 0.2s; box-shadow: 0 4px 22px rgba(26,122,53,.24); }
  .dark .share-btn { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  .share-btn:active { transform: scale(0.98); }
  .ios-banner { background: var(--glass-7); border: 1px solid var(--danger-border); border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; display: flex; align-items: flex-start; gap: 10px; box-shadow: 0 12px 36px rgba(0,0,0,.12); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
  .dark .ios-banner { background: rgba(22,25,31,.80); }
  .splash-panel-label {
    display:block;
    font-family: var(--ff-mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 4px;
  }
  @media (max-width: 640px) {
    .tracker-shell {
      padding: 8px 12px 10px;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tracker-shell::-webkit-scrollbar { display: none; }
    .tracker-shell-left {
      width: auto;
      min-width: 0;
      flex: 1 1 auto;

function stApplyHeaderProfile(user, profile) {
  const userChip = document.getElementById('stHeaderUser');
  const emailEl = document.getElementById('stHeaderEmail');
  const roleEl = document.getElementById('stHeaderRole');
  if (!userChip || !emailEl || !roleEl) return;
  const role = String((profile && profile.role) || 'viewer').toLowerCase();
  const roleLabels = {
    admin: 'Admin',
    reviewer: 'Reviewer',
    editor: 'Editor',
    viewer: 'Viewer'
  };
  emailEl.textContent = (user && user.email) || (profile && profile.email) || '—';
  roleEl.textContent = roleLabels[role] || 'Viewer';
  roleEl.className = 'tracker-shell-role role-' + (roleLabels[role] ? role : 'viewer');

async function stProfileAllowed(sb, user) {
  const { data, error } = await sb
    .from('pw_profiles')
    .select('*')
    .eq('id', user.id)
    .maybeSingle();
  if (error) throw error;
  if (!data) return { allowed: true, profile: null };
  return { allowed: data.approved !== false && data.disabled !== true && data.shift_tracker_access !== false, profile: data };
}
